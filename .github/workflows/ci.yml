name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: llm_tree
          POSTGRES_USER: llm_tree
          POSTGRES_PASSWORD: llm_tree_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U llm_tree"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/llm_tree
          SPRING_DATASOURCE_USERNAME: llm_tree
          SPRING_DATASOURCE_PASSWORD: llm_tree_dev
          SPRING_PROFILES_ACTIVE: test
        run: mvn verify -B

  frontend:
    name: Frontend — Build & Typecheck
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
